# ===== Configuracoes comuns a todos os ambientes =====
spring.application.name=comanda-digital
server.port=8080

# Profile padrao (sobrescreva com -Dspring-boot.run.profiles=local|dev|prod)
spring.profiles.active=local

# JPA / Hibernate (comum) - DDL sempre via Flyway, nunca pelo Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs

# JWT (valor padrao; sobrescrito por profile)
app.jwt.expiration-ms=28800000

# Jackson - datas em ISO-8601
spring.jackson.serialization.write-dates-as-timestamps=false
