services:
  mysql:
    image: mysql:8
    container_name: comanda_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: comanda_digital
    ports:
      - "3306:3306"
    volumes:
      - comanda_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  comanda_mysql_data:
