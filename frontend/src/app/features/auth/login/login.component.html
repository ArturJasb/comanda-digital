<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark">🍔</span>
      <h1>Comanda Digital</h1>
      <p class="text-muted">Acesse sua conta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email">
        <mat-error>Informe um email valido</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="senha" autocomplete="current-password">
        <mat-error>Informe a senha</mat-error>
      </mat-form-field>

      <button mat-raised-button class="btn-primary full-width" type="submit" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-foot">
      Nao tem conta? <a routerLink="/auth/register">Cadastre-se</a>
    </p>
    <p class="auth-foot"><a routerLink="/">Voltar ao cardapio</a></p>
    <p class="auth-hint text-muted">Demo: admin&#64;email.com / senha123</p>
  </div>
</div>
