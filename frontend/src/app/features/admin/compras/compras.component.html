<div class="page-header">
  <h1>Compras</h1>
  <button mat-raised-button class="btn-primary" (click)="abrir()"><mat-icon>add</mat-icon> Novo pedido de compra</button>
</div>

<div class="card">
  <table mat-table [dataSource]="compras" class="full-width">
    <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let c">{{ c.id }}</td></ng-container>
    <ng-container matColumnDef="fornecedor"><th mat-header-cell *matHeaderCellDef>Fornecedor</th>
      <td mat-cell *matCellDef="let c">{{ c.fornecedorNome }}</td></ng-container>
    <ng-container matColumnDef="data"><th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let c" class="text-muted">{{ c.createdAt | date:'dd/MM HH:mm' }}</td></ng-container>
    <ng-container matColumnDef="itens"><th mat-header-cell *matHeaderCellDef>Itens</th>
      <td mat-cell *matCellDef="let c">{{ c.itens.length }}</td></ng-container>
    <ng-container matColumnDef="total"><th mat-header-cell *matHeaderCellDef>Total</th>
      <td mat-cell *matCellDef="let c">{{ c.valorTotal | currencyBr }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c"><span class="status-badge" [ngClass]="'status-' + c.status">{{ c.status }}</span></td></ng-container>
    <ng-container matColumnDef="acoes"><th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let c">
        <button mat-icon-button matTooltip="Enviar" *ngIf="c.status === 'RASCUNHO'" (click)="enviar(c)"><mat-icon>send</mat-icon></button>
        <button mat-icon-button color="primary" matTooltip="Receber" *ngIf="c.status === 'RASCUNHO' || c.status === 'ENVIADO'" (click)="receber(c)"><mat-icon>inventory</mat-icon></button>
        <button mat-icon-button color="warn" matTooltip="Cancelar" *ngIf="c.status === 'RASCUNHO' || c.status === 'ENVIADO'" (click)="cancelar(c)"><mat-icon>cancel</mat-icon></button>
      </td></ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols"></tr>
  </table>
  <div class="empty-state" *ngIf="compras.length === 0"><mat-icon>shopping_bag</mat-icon><p>Nenhum pedido de compra.</p></div>
</div>
