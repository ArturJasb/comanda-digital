<div class="page-header">
  <h1>Fornecedores</h1>
  <div class="header-actions">
    <button mat-stroked-button (click)="cotacao()"><mat-icon>compare_arrows</mat-icon> Cotacao</button>
    <button mat-raised-button class="btn-primary" (click)="abrir()"><mat-icon>add</mat-icon> Novo fornecedor</button>
  </div>
</div>

<div class="card">
  <table mat-table [dataSource]="fornecedores" class="full-width">
    <ng-container matColumnDef="razao"><th mat-header-cell *matHeaderCellDef>Razao social</th>
      <td mat-cell *matCellDef="let f">{{ f.razaoSocial }}</td></ng-container>
    <ng-container matColumnDef="cnpj"><th mat-header-cell *matHeaderCellDef>CNPJ</th>
      <td mat-cell *matCellDef="let f" class="text-muted">{{ f.cnpj }}</td></ng-container>
    <ng-container matColumnDef="contato"><th mat-header-cell *matHeaderCellDef>Contato</th>
      <td mat-cell *matCellDef="let f" class="text-muted">{{ f.telefone }}</td></ng-container>
    <ng-container matColumnDef="produtos"><th mat-header-cell *matHeaderCellDef>Itens</th>
      <td mat-cell *matCellDef="let f">{{ f.produtos.length }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let f"><span class="status-badge" [ngClass]="'status-' + (f.status === 'ATIVO' ? 'PRONTO' : 'CANCELADO')">{{ f.status }}</span></td></ng-container>
    <ng-container matColumnDef="acoes"><th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let f">
        <button mat-icon-button matTooltip="Editar" (click)="abrir(f)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" matTooltip="Desativar" *ngIf="f.status === 'ATIVO'" (click)="desativar(f)"><mat-icon>block</mat-icon></button>
        <button mat-icon-button color="primary" matTooltip="Reativar" *ngIf="f.status !== 'ATIVO'" (click)="reativar(f)"><mat-icon>check_circle</mat-icon></button>
      </td></ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols"></tr>
  </table>
  <div class="empty-state" *ngIf="fornecedores.length === 0"><mat-icon>local_shipping</mat-icon><p>Nenhum fornecedor.</p></div>
</div>
