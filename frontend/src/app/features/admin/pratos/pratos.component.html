<div class="page-header">
  <h1>Pratos</h1>
  <button mat-raised-button class="btn-primary" (click)="abrir()"><mat-icon>add</mat-icon> Novo prato</button>
</div>

<div class="card">
  <table mat-table [dataSource]="pratos" class="full-width">
    <ng-container matColumnDef="foto"><th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let p">
        <div class="thumb" [style.backgroundImage]="'url(' + (p.fotoUrl || 'https://via.placeholder.com/60') + ')'"></div>
      </td></ng-container>
    <ng-container matColumnDef="nome"><th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let p">
        <strong>{{ p.nome }}</strong>
        <span class="ficha-flag" *ngIf="!p.temFicha"><mat-icon>warning</mat-icon> sem ficha</span>
      </td></ng-container>
    <ng-container matColumnDef="categoria"><th mat-header-cell *matHeaderCellDef>Categoria</th>
      <td mat-cell *matCellDef="let p" class="text-muted">{{ p.categoriaNome }}</td></ng-container>
    <ng-container matColumnDef="preco"><th mat-header-cell *matHeaderCellDef>Preco</th>
      <td mat-cell *matCellDef="let p">{{ p.precoVenda | currencyBr }}</td></ng-container>
    <ng-container matColumnDef="foodcost"><th mat-header-cell *matHeaderCellDef>Food cost</th>
      <td mat-cell *matCellDef="let p">
        <span class="food-cost" [ngClass]="p.foodCostCor || 'verde'" *ngIf="p.temFicha">{{ p.foodCostPct }}%</span>
        <span class="text-muted" *ngIf="!p.temFicha">—</span>
      </td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let p"><span class="status-badge" [ngClass]="badgeClass(p.status)">{{ p.status }}</span></td></ng-container>
    <ng-container matColumnDef="acoes"><th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button matTooltip="Editar" (click)="abrir(p)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button matTooltip="Ficha tecnica" (click)="editarFicha(p)"><mat-icon>menu_book</mat-icon></button>
        <button mat-icon-button color="warn" matTooltip="Desativar" *ngIf="p.status !== 'INATIVO'" (click)="desativar(p)"><mat-icon>block</mat-icon></button>
        <button mat-icon-button color="primary" *ngIf="p.status === 'INATIVO'" (click)="reativar(p)"
                [disabled]="!p.temFicha"
                [matTooltip]="p.temFicha ? 'Reativar' : 'Crie a ficha tecnica para poder ativar (RN-01)'">
          <mat-icon>check_circle</mat-icon>
        </button>
      </td></ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols"></tr>
  </table>
  <div class="empty-state" *ngIf="pratos.length === 0"><mat-icon>lunch_dining</mat-icon><p>Nenhum prato cadastrado.</p></div>
</div>
